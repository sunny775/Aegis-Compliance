server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # SPA: serve the file if it exists, otherwise fall back to index.html so
  # client-side routes (/dashboard, /gap-analysis, /documents/:id) deep-link.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache fingerprinted assets aggressively; never cache the HTML shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
