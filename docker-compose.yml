# One-command local run:  ANTHROPIC_API_KEY=sk-ant-... docker compose up --build
# (or put ANTHROPIC_API_KEY in a repo-root .env file — it is git-ignored.)
#
#   API → http://localhost:4000   ·   Web → http://localhost:5173

services:
  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in your shell or a .env file}
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      # SEED_PRERUN_GAP: "false"   # uncomment for a fast boot without the gap pre-run
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - '5173:80'
    depends_on:
      - api
